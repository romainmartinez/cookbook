default_channel = "text"


[shell_integration]
fallback_channel = "text"

[shell_integration.channel_triggers]
"alias" = ["alias", "unalias"]
"env" = ["export", "unset"]
"dirs" = ["cd", "ls", "rmdir", "z"]
"files" = [
  "cat",
  "less",
  "head",
  "tail",
  "vim",
  "nano",
  "bat",
  "cp",
  "mv",
  "rm",
  "touch",
  "chmod",
  "chown",
  "ln",
  "tar",
  "zip",
  "unzip",
  "gzip",
  "gunzip",
  "xz",
]
"git-diff" = ["git add", "git restore"]
"git-branch" = [
  "git checkout",
  "git switch",
  "git branch",
  "git merge",
  "git rebase",
  "git pull",
  "git push",
]
"git-log" = ["git log", "git show"]
"git-repos" = ["nvim", "code", "hx", "git clone"]
"procs" = ["kill", "pkill", "ps"]
"tldr" = ["tldr"]
"brew-packages" = ["brew uninstall", "brew info", "brew reinstall"]
"opencode-sessions" = ["oc", "opencode"]
