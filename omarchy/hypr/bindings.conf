# Hyper = caps_lock via keyd (super+ctrl+alt+shift)
bindd = SUPER CTRL ALT SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER CTRL ALT SHIFT, F, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER CTRL ALT SHIFT, S, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"

bindd = SUPER CTRL ALT SHIFT, C, Clipboard manager, exec, walker -m clipboard
bindd = SUPER CTRL ALT SHIFT, N, Obsidian, exec, uwsm-app -- obsidian --enable-wayland-ime --ozone-platform=wayland
bindd = SUPER CTRL ALT SHIFT, W, Window switcher, exec, walker -m windows

# Replace SUPER+K (reference-only cheat sheet) with executable version
unbind = SUPER, K
bindd = SUPER, K, Keybindings (Enter to run), exec, omarchy-menu-keybindings-run

# Right shift tap (via keyd -> F13) opens Omarchy menu
bindd = , XF86Tools, Omarchy menu (right shift tap), exec, omarchy-menu

# Override SUPER+F: use full width (keeps bars) instead of true fullscreen
unbind = SUPER, F
bindd = SUPER, F, Full width, fullscreen, 1
