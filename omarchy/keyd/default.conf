# keyd config - portable subset of karabiner.json
#
# Install: sudo ln -sfn ~/Documents/cookbook/omarchy/keyd/default.conf /etc/keyd/default.conf
#          sudo systemctl enable --now keyd
#          sudo keyd reload
#
# Docs: https://github.com/rvaiya/keyd

[ids]
*

[main]
# Tab: hold = left ctrl, tap = tab
tab = overload(control, tab)

# Caps lock: hold = "hyper" layer, tap = escape
# Linux hyper = super+ctrl+alt+shift
capslock = overload(hyper, esc)

# Right shift: hold = shift, tap = F13 (bound to Omarchy menu in Hyprland)
rightshift = overload(shift, f13)

[hyper:C-A-S-M]
# Hyper layer emits Super+Ctrl+Alt+Shift as the modifier.
# Any key pressed while holding caps gets these mods added.
# hjkl remap to arrows on this layer:
h = left
j = down
k = up
l = right
